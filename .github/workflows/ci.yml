name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Lint, tests & Android build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests, compile checks, and debug APK build
        run: ./gradlew ci --no-daemon --stacktrace

      - name: Run Android Lint
        continue-on-error: true
        run: ./gradlew :shared:lintDebug :composeApp:lintDebug :androidApp:lintDebug --no-daemon

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: shared/build/reports/tests/
          retention-days: 7

  ios-compile:
    name: Compile iOS (KMP)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Compile ComposeApp for iOS Simulator
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --no-daemon --stacktrace
